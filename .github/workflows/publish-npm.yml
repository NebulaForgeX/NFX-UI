# 每次 push 到 main 时：若 package.json 的 version 在 npm 上尚未发布，则 build 并 publish
# 使用 npm Trusted Publishing（OIDC），无需在 GitHub 存 NPM_TOKEN，更安全
# 需在 npm 包 nfx-ui 的 Access 里添加 Trusted Publisher：GitHub Actions，workflow 填 publish-npm.yml，仓库填 你的 owner/NFX-UI

name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'src/**'
      - 'vite.config.ts'
      - 'tsconfig*.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # 供 npm Trusted Publishing (OIDC) 使用
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # 不在 CI 里 `npm i -g npm@latest`：部分 runner 上会 MODULE_NOT_FOUND（如 promise-retry），导致整 job 失败。
      # Trusted Publishing（OIDC）需 npm 11.5.1+：发布步骤用 npx 拉取 npm 11，避免污染全局 npm。

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if version already published
        id: check
        run: |
          if npm view nfx-ui@${{ steps.pkg.outputs.version }} version 2>/dev/null; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Install and build
        if: steps.check.outputs.published != 'true'
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        if: steps.check.outputs.published != 'true'
        run: npx --yes npm@11 publish --provenance
