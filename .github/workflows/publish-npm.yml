# 每次 push 到 main 时：若 package.json 的 version 在 npm 上尚未发布，则 build 并 publish
# 使用 npm Trusted Publishing（OIDC），无需在 GitHub 存 NPM_TOKEN，更安全
# 需在 npm 包 nfx-ui 的 Access 里添加 Trusted Publisher：GitHub Actions，workflow 填 publish-npm.yml，仓库填 你的 owner/NFX-UI

name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'src/**'
      - 'vite.config.ts'
      - 'tsconfig*.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      id-token: write  # 供 npm Trusted Publishing (OIDC) 使用
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 全程使用最新 npm（Trusted Publishing 需 npm 11.5.1+）
      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if version already published
        id: check
        run: |
          if npm view nfx-ui@${{ steps.pkg.outputs.version }} version 2>/dev/null; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Install and build
        if: steps.check.outputs.published != 'true'
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        if: steps.check.outputs.published != 'true'
        run: npm publish --provenance
